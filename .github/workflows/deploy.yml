name: CI/CD to GCE

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node (for frontend and node-api)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python (for FastAPI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # Optional: Package backend or node-api if needed

      - name: Upload files to GCE via SSH
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USERNAME }}
          key: ${{ secrets.GCE_SSH_KEY }}
          source: "./"
          target: "/home/${{ secrets.GCE_USERNAME }}/app"

      - name: SSH into GCE and restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCE_HOST }}
          username: ${{ secrets.GCE_USERNAME }}
          key: ${{ secrets.GCE_SSH_KEY }}
          script: |
            cd /home/${{ secrets.GCE_USERNAME }}/app
            # Optional: reload env vars
            # source .env
            # Restart services
            sudo systemctl restart fastapi
            sudo systemctl restart nodeapi
