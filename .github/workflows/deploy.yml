name: CI/CD to GCE (WORKING)

on:
  workflow_dispatch:   # 🔥 allows manual "Run workflow"
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Build frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.GCE_INSTANCE_IP }} >> ~/.ssh/known_hosts

    - name: Upload build to server
      run: |
        scp -r frontend/build user@${{ secrets.GCE_INSTANCE_IP }}:/var/www/app/build

    - name: Deploy on server
      run: |
        ssh user@${{ secrets.GCE_INSTANCE_IP }} << 'EOF'
          set -e

          cd /var/www/app

          # restart app (choose ONE depending on your stack)
          pm2 restart all || true
          # OR
          # systemctl restart myapp

          echo "✅ Deployment complete"
        EOF
